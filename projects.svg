  <defs>
    <linearGradient id="topgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47a1e"/>
      <stop offset="100%" stop-color="#f5c87a"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#130b00"/>
      <stop offset="100%" stop-color="#0a0600"/>
    </linearGradient>
    <linearGradient id="rowgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c0e00"/>
      <stop offset="100%" stop-color="#110800"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c47a1e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c47a1e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

