<svg width="620" height="445" viewBox="0 0 620 445" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Prerit Arya Terminal</title>
  <defs>
    <linearGradient id="topgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47a1e"/>
      <stop offset="100%" stop-color="#f5c87a"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#130b00"/>
      <stop offset="100%" stop-color="#0a0600"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c47a1e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c47a1e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Root level float + fade -->
  <animateTransform attributeName="transform" attributeType="XML" type="translate"
    values="0,0; 0,-5; 0,0" dur="5s" repeatCount="indefinite"
    calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>

  <!-- Outer glow halo -->
  <rect x="8" y="8" width="604" height="429" rx="14" fill="#c47a1e" opacity="0.07" filter="url(#outerGlow)"/>

  <!-- Terminal window -->
  <rect x="8" y="8" width="604" height="429" rx="14" fill="url(#bggrad)" stroke="#3d1f00" stroke-width="1.2"/>

  <!-- Top bar -->
  <rect x="8" y="8" width="604" height="38" rx="14" fill="#1c0e00"/>
  <rect x="8" y="32" width="604" height="14" fill="#1c0e00"/>
  <rect x="8" y="8" width="604" height="5" rx="3" fill="url(#topgrad)" filter="url(#glow)"/>
  <rect x="8" y="8" width="3" height="429" rx="2" fill="url(#topgrad)" filter="url(#glow)"/>
  <rect x="8" y="8" width="604" height="80" rx="14" fill="url(#innerGlow)"/>

  <!-- Traffic lights -->
  <circle cx="30" cy="27" r="6" fill="#3d1f00"/>
  <circle cx="50" cy="27" r="6" fill="#3d1f00"/>
  <circle cx="70" cy="27" r="6" fill="#5c3a0a"/>
  <text x="310" y="32" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7a5c2e">prerit@github ~ terminal</text>

  <!-- whoami -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="28" y="76"><tspan fill="#c47a1e">❯ </tspan>whoami<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.02;0.05;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#f0d49a">
    <tspan x="28" y="96">Prerit Arya  —  AI · ML · IoT Engineer<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.10;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12" fill="#7a5c2e">
    <tspan x="28" y="114">📍 Bhubaneswar, India  ·  KIIT University 2027<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.10;0.13;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <line x1="28" y1="126" x2="588" y2="126" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.13;0.15;1" dur="6s" fill="freeze"/>
  </line>

  <!-- cat interests -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="28" y="146"><tspan fill="#c47a1e">❯ </tspan>cat interests.txt<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.15;0.18;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="28" y="166"><tspan fill="#c47a1e">◈ </tspan>Computer Vision &amp; Edge AI<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.19;0.22;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="28" y="184"><tspan fill="#c47a1e">◈ </tspan>IoT Systems &amp; Embedded Hardware<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.23;0.26;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="28" y="202"><tspan fill="#c47a1e">◈ </tspan>Cloud-Native ML Pipelines<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.27;0.30;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="28" y="220"><tspan fill="#c47a1e">◈ </tspan>NLP &amp; Intelligent Agents<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.31;0.34;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <line x1="28" y1="232" x2="588" y2="232" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.34;0.36;1" dur="6s" fill="freeze"/>
  </line>

  <!-- skills -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="28" y="252"><tspan fill="#c47a1e">❯ </tspan>skills --languages<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.39;1" dur="6s" fill="freeze"/></tspan>
  </text>

  <text x="28" y="274" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">Python <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.39;0.42;1" dur="6s" fill="freeze"/></text>
  <rect x="104" y="262" width="0" height="12" rx="2" fill="url(#topgrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.39;0.42;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;170" begin="3.6s" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="282" y="274" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">Expert<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.45;1" dur="6s" fill="freeze"/></text>

  <text x="28" y="294" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">C    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.45;0.48;1" dur="6s" fill="freeze"/></text>
  <rect x="104" y="282" width="0" height="12" rx="2" fill="url(#topgrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.45;0.48;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;130" begin="4s" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="242" y="294" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">Proficient<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.48;0.51;1" dur="6s" fill="freeze"/></text>

  <text x="28" y="314" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">SQL    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.51;0.54;1" dur="6s" fill="freeze"/></text>
  <rect x="104" y="302" width="0" height="12" rx="2" fill="url(#topgrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.51;0.54;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;108" begin="4.4s" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="220" y="314" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">Proficient<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.54;0.57;1" dur="6s" fill="freeze"/></text>

  <text x="28" y="334" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">Java   <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.57;0.60;1" dur="6s" fill="freeze"/></text>
  <rect x="104" y="322" width="0" height="12" rx="2" fill="url(#topgrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.57;0.60;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;80" begin="4.8s" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="192" y="334" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">Intermediate<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.60;0.63;1" dur="6s" fill="freeze"/></text>

  <line x1="28" y1="348" x2="588" y2="348" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.63;0.65;1" dur="6s" fill="freeze"/>
  </line>

  <!-- status -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="28" y="368"><tspan fill="#c47a1e">❯ </tspan>status<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.65;0.68;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#f0d49a">
    <tspan x="28" y="390"><tspan fill="#f5c87a">✦ </tspan>Open to internship opportunities<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.69;0.72;1" dur="6s" fill="freeze"/></tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="28" y="404" width="9" height="14" rx="1" fill="#c47a1e" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.71;0.74;1" dur="6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" begin="5s"/>
  </rect>

</svg>
