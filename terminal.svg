<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Prerit Arya Terminal</title>
  <desc>Animated terminal about section</desc>

  <defs>
    <linearGradient id="topgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47a1e"/>
      <stop offset="100%" stop-color="#f5c87a"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#130b00"/>
      <stop offset="100%" stop-color="#0a0600"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="600" height="420" rx="14" fill="url(#bggrad)" stroke="#3d1f00" stroke-width="1.2"/>
  <!-- Top bar -->
  <rect width="600" height="38" rx="14" fill="#1c0e00"/>
  <rect y="24" width="600" height="14" fill="#1c0e00"/>
  <rect width="600" height="5" rx="3" fill="url(#topgrad)"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#3d1f00"/>
  <circle cx="42" cy="19" r="6" fill="#3d1f00"/>
  <circle cx="62" cy="19" r="6" fill="#5c3a0a"/>
  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7a5c2e">prerit@github ~ terminal</text>

  <!-- Line 1: whoami command -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="24" y="72">
      <tspan fill="#c47a1e">❯ </tspan>whoami
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.02;0.04;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>

  <!-- whoami output -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f0d49a">
    <tspan x="24" y="94">
      Prerit Arya  —  AI · ML · IoT Engineer
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.09;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12" fill="#7a5c2e">
    <tspan x="24" y="112">
      📍 Bhubaneswar, India  ·  KIIT University 2027
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.09;0.12;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Divider -->
  <line x1="24" y1="124" x2="576" y2="124" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.12;0.14;1" dur="6s" fill="freeze"/>
  </line>

  <!-- Line 2: cat interests -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="24" y="144">
      <tspan fill="#c47a1e">❯ </tspan>cat interests.txt
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.14;0.17;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>

  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="24" y="164"><tspan fill="#c47a1e">◈ </tspan>Computer Vision &amp; Edge AI<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.21;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="24" y="182"><tspan fill="#c47a1e">◈ </tspan>IoT Systems &amp; Embedded Hardware<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.22;0.25;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="24" y="200"><tspan fill="#c47a1e">◈ </tspan>Cloud-Native ML Pipelines<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.26;0.29;1" dur="6s" fill="freeze"/></tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#d4a855">
    <tspan x="24" y="218"><tspan fill="#c47a1e">◈ </tspan>NLP &amp; Intelligent Agents<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.30;0.33;1" dur="6s" fill="freeze"/></tspan>
  </text>

  <!-- Divider -->
  <line x1="24" y1="230" x2="576" y2="230" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.33;0.35;1" dur="6s" fill="freeze"/>
  </line>

  <!-- Line 3: skills -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="24" y="250">
      <tspan fill="#c47a1e">❯ </tspan>skills --languages
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.35;0.38;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Python bar -->
  <text x="24" y="272" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">
    Python  <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.41;1" dur="6s" fill="freeze"/>
  </text>
  <rect x="100" y="260" width="0" height="12" rx="2" fill="#c47a1e">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.41;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;160" begin="3.6s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="268" y="272" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">
    Expert<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.41;0.44;1" dur="6s" fill="freeze"/>
  </text>

  <!-- C bar -->
  <text x="24" y="292" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">
    C   <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.44;0.47;1" dur="6s" fill="freeze"/>
  </text>
  <rect x="100" y="280" width="0" height="12" rx="2" fill="#c47a1e">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.44;0.47;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;120" begin="4s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="228" y="292" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">
    Proficient<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.47;0.50;1" dur="6s" fill="freeze"/>
  </text>

  <!-- SQL bar -->
  <text x="24" y="312" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">
    SQL     <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.50;0.53;1" dur="6s" fill="freeze"/>
  </text>
  <rect x="100" y="300" width="0" height="12" rx="2" fill="#c47a1e">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.50;0.53;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;100" begin="4.4s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="208" y="312" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">
    Proficient<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.53;0.56;1" dur="6s" fill="freeze"/>
  </text>

  <!-- Java bar -->
  <text x="24" y="332" font-family="'Courier New', monospace" font-size="12" fill="#f0d49a">
    Java    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.56;0.59;1" dur="6s" fill="freeze"/>
  </text>
  <rect x="100" y="320" width="0" height="12" rx="2" fill="#c47a1e">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.56;0.59;1" dur="6s" fill="freeze"/>
    <animate attributeName="width" values="0;75" begin="4.8s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="183" y="332" font-family="'Courier New', monospace" font-size="11" fill="#7a5c2e">
    Intermediate<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.59;0.62;1" dur="6s" fill="freeze"/>
  </text>

  <!-- Divider -->
  <line x1="24" y1="346" x2="576" y2="346" stroke="#3d1f00" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.62;0.64;1" dur="6s" fill="freeze"/>
  </line>

  <!-- Status line -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#f5c87a">
    <tspan x="24" y="366">
      <tspan fill="#c47a1e">❯ </tspan>status
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.64;0.67;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>
  <text font-family="'Courier New', monospace" font-size="12.5" fill="#f0d49a">
    <tspan x="24" y="386">
      <tspan fill="#f5c87a">✦ </tspan>Open to internship opportunities
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.68;0.71;1" dur="6s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="24" y="398" width="9" height="14" rx="1" fill="#c47a1e">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite" begin="5s"/>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.70;0.73;1" dur="6s" fill="freeze"/>
  </rect>

</svg>
